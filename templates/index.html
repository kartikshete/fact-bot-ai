<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Facts Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <button id="themeToggle" class="theme-toggle">🌙 Dark Mode</button>

    <div class="container">
        <h1>Tech Facts Chatbot</h1>

        <div class="action-box">
            <button id="getFactBtn" class="btn-blue">Get Random Fact</button>
        </div>

        <div class="display-box">
            <p id="factDisplay"><strong>Fact:</strong> <span id="factText">Click the button to get a fact!</span></p>
        </div>

        <div class="input-box">
            <input type="text" id="newFactInput" placeholder="Teach me a new fact">
            <button id="addFactBtn" class="btn-blue">Add Fact</button>
        </div>
    </div>

    <script>
        const getFactBtn = document.getElementById('getFactBtn');
        const addFactBtn = document.getElementById('addFactBtn');
        const themeToggle = document.getElementById('themeToggle');
        const factText = document.getElementById('factText');
        const newFactInput = document.getElementById('newFactInput');

        // Theme Toggle Logic
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateToggleBtn(savedTheme);

        themeToggle.onclick = () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateToggleBtn(newTheme);
        };

        function updateToggleBtn(theme) {
            themeToggle.innerText = theme === 'light' ? '🌙 Dark Mode' : '☀️ Light Mode';
        }

        getFactBtn.onclick = async () => {
            const res = await fetch('/get-fact');
            const data = await res.json();
            factText.innerText = data.fact;
        };

        addFactBtn.onclick = async () => {
            const fact = newFactInput.value;
            if (!fact) return alert("Please enter a fact!");

            const res = await fetch('/add-fact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fact })
            });
            const data = await res.json();
            alert(data.message);
            newFactInput.value = '';
        };
    </script>
</body>

</html>
